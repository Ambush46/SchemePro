<!-- LOGIN MODAL -->
<div class="modal-overlay" id="login-modal" onclick="closeModalOutside(event,'login-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('login-modal')">×</button>
    <div class="modal-title">Welcome back</div>
    <div class="modal-sub">Sign in to your SchemePro account</div>
    <div id="login-error" class="alert alert-error" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">Username or Email</label>
      <input class="form-input" id="login-user" type="text" placeholder="username or email" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
    <div class="modal-footer">No account? <a onclick="switchModal('login-modal','register-modal')">Sign up free</a></div>
  </div>
</div>

<!-- REGISTER MODAL -->
<div class="modal-overlay" id="register-modal" onclick="closeModalOutside(event,'register-modal')">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('register-modal')">×</button>
    <div class="modal-title">Create account</div>
    <div class="modal-sub">Start generating schemes of work today</div>
    <div id="register-error" class="alert alert-error" style="display:none"></div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="reg-name" type="text" placeholder="Jane Muthoni">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="reg-username" type="text" placeholder="janemuthoni">
      </div>
      <div class="form-group form-full">
        <label class="form-label">Email</label>
        <input class="form-input" id="reg-email" type="email" placeholder="jane@school.ac.ke">
      </div>
      <div class="form-group">
        <label class="form-label">Region / County</label>
        <input class="form-input" id="reg-region" type="text" placeholder="e.g. Nairobi">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="reg-pass" type="password" placeholder="Min 8 characters">
      </div>
      <div class="form-group form-full">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" id="reg-pass2" type="password" placeholder="Repeat password"
               onkeydown="if(event.key==='Enter')doRegister()">
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="doRegister()">Create Account</button>
    <div class="modal-footer">Have an account? <a onclick="switchModal('register-modal','login-modal')">Sign in</a></div>
  </div>
</div>
